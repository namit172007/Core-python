version: '3.8'

services:
  web:
    build: .
    image: sos:latest
    container_name: sos-container
    ports:
      - "8000:8000"
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: db-container
    environment:
      MYSQL_DATABASE: sos_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: