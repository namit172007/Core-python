<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f2f6fc;
        }

        .container{
            width:500px;
            margin:80px auto;
            background:#fff;
            padding:35px;
            border-radius:12px;
            box-shadow:0 0 15px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
            color:#003366;
            margin-bottom:20px;
        }

        h3{
            text-align:center;
            color:#555;
            margin-bottom:25px;
        }

        table{
            width:100%;
        }

        th{
            text-align:left;
            padding:12px 10px;
            color:#333;
            width:40%;
        }

        td{
            padding:12px 10px;
        }

        input[type="text"]{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:6px;
            font-size:15px;
        }

        input[type="text"]:focus{
            border:2px solid royalblue;
            outline:none;
        }

        input[type="submit"]{
            width:100%;
            padding:12px;
            background:royalblue;
            color:white;
            border:none;
            border-radius:6px;
            font-size:16px;
            cursor:pointer;
            margin-top:15px;
        }

        input[type="submit"]:hover{
            background:#003399;
        }
    </style>

</head>
<body>

{% include "Header.html" %}

<div class="container">

    <h1>LOGIN</h1>

    <form method="POST">
        {% csrf_token %}

        <h3>ENTER DETAILS TO PROCEED</h3>

        <table>

            <tr>
                <th>LOGIN NAME</th>
                <td>
                    <input type="text" name="login_name" placeholder="Enter Login Name">
                </td>
            </tr>

            <tr>
                <th>PHONE NUMBER</th>
                <td>
                    <input type="text" name="phone" placeholder="Enter Phone Number">
                </td>
            </tr>

            <tr>
                <td colspan="2">
                    <input type="submit" value="LOG IN">
                </td>
            </tr>

        </table>

    </form>

</div>

</body>
</html>
